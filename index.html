<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <title>谁是这个世界上最可爱的人？</title>
  <script>
    (function () {
      document.addEventListener('contextmenu', function (e) {
        e.preventDefault();
        return false;
      }, true);
      document.addEventListener('keydown', function (e) {
        var k = (e.key || '').toLowerCase();
        var c = e.keyCode || e.which || 0;
        if (c === 123 || k === 'f12') {
          e.preventDefault();
          return false;
        }
        if (e.ctrlKey || e.metaKey) {
          if (e.shiftKey && (k === 'i' || k === 'j' || k === 'c' || k === 'k')) {
            e.preventDefault();
            return false;
          }
          if (k === 'u' || k === 's' || k === 'p') {
            e.preventDefault();
            return false;
          }
        }
        if (e.metaKey && e.altKey && (k === 'u' || k === 'i')) {
          e.preventDefault();
          return false;
        }
      }, true);
    })();
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    }

    body {
      background: #0a0015;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      -webkit-user-select: none;
      user-select: none;
    }

    input, textarea {
      -webkit-user-select: text;
      user-select: text;
    }

    .source-shield {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: linear-gradient(135deg, #0a0015, #1a0030);
      color: rgba(255, 255, 255, 0.9);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
      gap: 16px;
    }

    .source-shield.show {
      display: flex;
    }

    .source-shield .shield-icon {
      font-size: 3rem;
    }

    .source-shield p {
      font-size: 1.1rem;
      line-height: 1.7;
      max-width: 320px;
    }

    html.devtools-blocked .steps-wrapper,
    html.devtools-blocked #final-scene,
    html.devtools-blocked .aurora,
    html.devtools-blocked canvas,
    html.devtools-blocked #hearts-container {
      visibility: hidden;
    }

    /* 极光背景 */
    .aurora {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background: radial-gradient(ellipse at 20% 80%, rgba(120, 0, 255, 0.3) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 20%, rgba(255, 0, 128, 0.25) 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 50%, rgba(0, 200, 255, 0.15) 0%, transparent 60%),
                  linear-gradient(180deg, #0a0015 0%, #1a0030 40%, #0d0020 100%);
    }

    .aurora::before,
    .aurora::after {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      animation: auroraShift 12s ease-in-out infinite alternate;
    }

    .aurora::before {
      background: conic-gradient(from 0deg at 50% 50%,
        transparent, rgba(255, 105, 180, 0.15), transparent,
        rgba(138, 43, 226, 0.2), transparent,
        rgba(0, 255, 200, 0.12), transparent);
    }

    .aurora::after {
      background: conic-gradient(from 180deg at 50% 50%,
        transparent, rgba(255, 215, 0, 0.1), transparent,
        rgba(255, 20, 147, 0.15), transparent);
      animation-delay: -6s;
      animation-duration: 15s;
    }

    @keyframes auroraShift {
      0% { transform: rotate(0deg) scale(1); }
      100% { transform: rotate(30deg) scale(1.1); }
    }

    /* 星星层 */
    #stars-canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* 步骤容器 */
    .steps-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 24px;
      perspective: 1000px;
    }

    .step {
      display: none;
      text-align: center;
      animation: stepIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .step.active {
      display: block;
    }

    @keyframes stepIn {
      0% { opacity: 0; transform: translateY(40px) rotateX(15deg) scale(0.9); }
      100% { opacity: 1; transform: translateY(0) rotateX(0) scale(1); }
    }

    .step-badge {
      display: inline-block;
      padding: 6px 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.85rem;
      letter-spacing: 3px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }

    .step h1 {
      font-size: 1.9rem;
      background: linear-gradient(135deg, #fff 0%, #ffd6e8 40%, #ffb3d9 70%, #fff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
      margin-bottom: 12px;
      line-height: 1.4;
      filter: drop-shadow(0 0 20px rgba(255, 105, 180, 0.5));
    }

    @keyframes shimmer {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .step .subtitle {
      color: rgba(255, 255, 255, 0.65);
      font-size: 1rem;
      margin-bottom: 32px;
    }

    /* 进度条 */
    .progress-bar {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 28px;
    }

    .progress-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transition: all 0.4s;
    }

    .progress-dot.done {
      background: linear-gradient(135deg, #ff6b9d, #c44dff);
      box-shadow: 0 0 12px rgba(255, 107, 157, 0.8);
    }

    .progress-dot.current {
      background: #fff;
      box-shadow: 0 0 16px rgba(255, 255, 255, 0.9);
      transform: scale(1.3);
    }

    /* 选项卡片 */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .option-card {
      padding: 20px 12px;
      border-radius: 20px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      color: #fff;
    }

    .option-card:hover {
      transform: translateY(-4px) scale(1.03);
      border-color: rgba(255, 182, 193, 0.6);
      box-shadow: 0 8px 30px rgba(255, 105, 180, 0.3);
    }

    .option-card:active {
      transform: scale(0.96);
    }

    .option-card .emoji {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 8px;
    }

    .option-card .label {
      font-size: 1rem;
      font-weight: 600;
    }

    .option-card.wrong-shake {
      animation: wrongShake 0.6s ease;
      border-color: rgba(255, 80, 80, 0.8) !important;
    }

    @keyframes wrongShake {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(-10px) rotate(-3deg); }
      30% { transform: translateX(10px) rotate(3deg); }
      45% { transform: translateX(-8px); }
      60% { transform: translateX(8px); }
      75% { transform: translateX(-4px); }
    }

    /* 可爱度滑块 */
    .cute-meter {
      margin: 20px 0 30px;
    }

    .cute-meter label {
      display: block;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.95rem;
      margin-bottom: 16px;
    }

    .meter-track {
      position: relative;
      height: 24px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
      margin-bottom: 12px;
    }

    .meter-fill {
      height: 100%;
      width: 0%;
      border-radius: 12px;
      background: linear-gradient(90deg, #ff6b9d, #ff4081, #e040fb, #ffd700);
      background-size: 300% 100%;
      animation: meterGlow 2s linear infinite;
      transition: width 0.15s;
      box-shadow: 0 0 20px rgba(255, 64, 129, 0.6);
    }

    @keyframes meterGlow {
      0% { background-position: 0% center; }
      100% { background-position: 300% center; }
    }

    .meter-value {
      font-size: 2rem;
      font-weight: bold;
      background: linear-gradient(135deg, #ffd700, #ff6b9d, #e040fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    input[type="range"] {
      width: 100%;
      -webkit-appearance: none;
      height: 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.15);
      outline: none;
      margin-top: 16px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff6b9d, #e040fb);
      box-shadow: 0 0 16px rgba(255, 107, 157, 0.8);
      cursor: pointer;
    }

    /* 输入框 */
    .input-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .glow-input {
      width: 260px;
      padding: 16px 24px;
      border: 2px solid rgba(255, 182, 193, 0.4);
      border-radius: 30px;
      font-size: 1.2rem;
      text-align: center;
      outline: none;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      backdrop-filter: blur(10px);
      transition: box-shadow 0.3s, border-color 0.3s;
    }

    .glow-input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .glow-input:focus {
      border-color: rgba(255, 105, 180, 0.8);
      box-shadow: 0 0 30px rgba(255, 105, 180, 0.4), inset 0 0 20px rgba(255, 105, 180, 0.1);
    }

    .btn-primary {
      padding: 14px 48px;
      border: none;
      border-radius: 30px;
      font-size: 1.2rem;
      font-weight: bold;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, #ff6b9d, #e040fb, #7c4dff);
      background-size: 200% auto;
      animation: btnShine 3s linear infinite;
      box-shadow: 0 8px 30px rgba(224, 64, 251, 0.5);
      transition: transform 0.2s;
    }

    @keyframes btnShine {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .btn-primary:active {
      transform: scale(0.95);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: rgba(20, 0, 40, 0.9);
      border: 1px solid rgba(255, 105, 180, 0.4);
      color: #fff;
      padding: 24px 36px;
      border-radius: 20px;
      font-size: 1.15rem;
      z-index: 200;
      opacity: 0;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s;
      text-align: center;
      line-height: 1.6;
      backdrop-filter: blur(16px);
      box-shadow: 0 0 40px rgba(255, 105, 180, 0.3);
    }

    .toast.show {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    .toast .icon {
      font-size: 2.8rem;
      display: block;
      margin-bottom: 10px;
    }

    /* 最终页 */
    #final-scene {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      pointer-events: none;
    }

    #final-scene.active {
      display: flex;
    }

    .crown {
      font-size: 4rem;
      animation: crownFloat 2s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8));
      margin-bottom: 16px;
    }

    @keyframes crownFloat {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-12px) rotate(5deg); }
    }

    .final-name {
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(135deg, #ffd700 0%, #ff6b9d 25%, #fff 50%, #e040fb 75%, #ffd700 100%);
      background-size: 300% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: rainbowText 4s linear infinite, namePulse 2s ease-in-out infinite;
      filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.6));
      letter-spacing: 4px;
    }

    @keyframes rainbowText {
      0% { background-position: 0% center; }
      100% { background-position: 300% center; }
    }

    @keyframes namePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    .final-tagline {
      margin-top: 20px;
      font-size: 1.3rem;
      color: rgba(255, 255, 255, 0.85);
      text-shadow: 0 0 20px rgba(255, 105, 180, 0.6);
      animation: fadeInUp 1s ease 0.5s both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .final-hearts-ring {
      position: absolute;
      width: 300px;
      height: 300px;
      border: 2px dashed rgba(255, 105, 180, 0.3);
      border-radius: 50%;
      animation: ringSpin 20s linear infinite;
    }

    @keyframes ringSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* 粒子层 */
    #particles-canvas,
    #confetti-canvas,
    #hearts-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
    }

    #hearts-container { z-index: 55; }

    .heart {
      position: absolute;
      animation: floatUp linear forwards;
      text-shadow: 0 0 8px rgba(255, 23, 68, 0.6);
    }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
      100% { transform: translateY(-110vh) rotate(720deg) scale(0.2); opacity: 0; }
    }

    /* 光晕爆发 */
    .burst {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 105, 180, 0.6) 0%, transparent 70%);
      transform: translate(-50%, -50%);
      z-index: 90;
      pointer-events: none;
      animation: burstOut 1.5s ease-out forwards;
    }

    @keyframes burstOut {
      0% { width: 0; height: 0; opacity: 1; }
      100% { width: 200vmax; height: 200vmax; opacity: 0; }
    }

    /* 打字机效果 */
    .typing-text {
      min-height: 1.5em;
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.1rem;
      margin-bottom: 24px;
    }

    .typing-cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #ff6b9d;
      margin-left: 2px;
      animation: blink 0.8s step-end infinite;
      vertical-align: text-bottom;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* 可爱特质列表 */
    .trait-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .trait-item {
      padding: 14px 20px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      cursor: pointer;
      transition: all 0.3s;
      text-align: left;
      font-size: 1rem;
    }

    .trait-item:hover {
      background: rgba(255, 105, 180, 0.15);
      border-color: rgba(255, 105, 180, 0.5);
      transform: translateX(6px);
    }

    .trait-item.selected {
      background: linear-gradient(135deg, rgba(255, 107, 157, 0.3), rgba(224, 64, 251, 0.3));
      border-color: rgba(255, 105, 180, 0.8);
      box-shadow: 0 0 20px rgba(255, 105, 180, 0.3);
    }

    /* 抓捕「不可爱」关卡 */
    .escape-arena {
      position: relative;
      min-height: 260px;
      margin: 24px 0 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 36px;
    }

    .btn-round {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: none;
      font-size: 1.6rem;
      font-weight: bold;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-user-select: none;
      user-select: none;
    }

    .btn-round:active {
      transform: scale(0.92);
    }

    .btn-love-round {
      background: linear-gradient(145deg, #ff416c, #ff4b2b);
      color: #fff;
      box-shadow: 0 8px 30px rgba(255, 65, 108, 0.6);
      position: relative;
      z-index: 20;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
    }

    .btn-no-escape {
      background: linear-gradient(145deg, #bdc3c7, #95a5a6);
      color: #fff;
      box-shadow: 0 8px 25px rgba(149, 165, 166, 0.4);
      position: relative;
      z-index: 30;
      transition: left 0.14s ease-out, top 0.14s ease-out, transform 0.2s;
    }

    .btn-no-escape.fleeing {
      position: fixed;
    }

    .btn-no-escape.wiggle {
      animation: noWiggle 0.4s ease;
    }

    @keyframes noWiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-8deg) scale(0.95); }
      75% { transform: rotate(8deg) scale(0.95); }
    }

    .escape-hint {
      font-size: 0.95rem;
      color: rgba(255, 182, 193, 0.85);
      margin-top: 12px;
      min-height: 1.5em;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <canvas id="stars-canvas"></canvas>
  <canvas id="particles-canvas"></canvas>
  <canvas id="confetti-canvas"></canvas>
  <div id="hearts-container"></div>

  <div class="steps-wrapper">
    <!-- 第一关 -->
    <div class="step active" id="step1" data-step="1">
      <div class="progress-bar">
        <span class="progress-dot current"></span>
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
      </div>
      <span class="step-badge">第一关</span>
      <h1>谁是这个世界上最<br>可爱的人？</h1>
      <p class="subtitle">请用心选择，只有一次机会哦~</p>
      <div class="options-grid">
        <div class="option-card" data-answer="wrong">
          <span class="emoji">🐱</span>
          <span class="label">某网红猫</span>
        </div>
        <div class="option-card" data-answer="wrong">
          <span class="emoji">👸</span>
          <span class="label">迪士尼公主</span>
        </div>
        <div class="option-card" data-answer="wrong">
          <span class="emoji">🧸</span>
          <span class="label">玲娜贝儿</span>
        </div>
        <div class="option-card" data-answer="correct">
          <span class="emoji">🌙</span>
          <span class="label">吕明月</span>
        </div>
      </div>
    </div>

    <!-- 第二关：抓捕「不可爱」 -->
    <div class="step" id="step2" data-step="2">
      <div class="progress-bar">
        <span class="progress-dot done"></span>
        <span class="progress-dot current"></span>
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
      </div>
      <span class="step-badge">第二关 · 特别挑战</span>
      <h1>吕明月可爱吗？</h1>
      <p class="subtitle">诚实作答~ 「不可爱」按钮很狡猾，抓不住的哦 😏</p>
      <div class="escape-arena" id="escapeArena">
        <button class="btn-round btn-love-round" id="btnLoveRound">可爱</button>
        <button class="btn-round btn-no-escape" id="btnNoEscape">不可爱</button>
      </div>
      <p class="escape-hint" id="escapeHint">试试能不能点到「不可爱」？</p>
    </div>

    <!-- 第三关 -->
    <div class="step" id="step3" data-step="3">
      <div class="progress-bar">
        <span class="progress-dot done"></span>
        <span class="progress-dot done"></span>
        <span class="progress-dot current"></span>
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
      </div>
      <span class="step-badge">第三关</span>
      <h1>她有多可爱？</h1>
      <p class="subtitle">拖动滑块，诚实作答~</p>
      <div class="cute-meter">
        <label>可爱指数</label>
        <div class="meter-track">
          <div class="meter-fill" id="meterFill"></div>
        </div>
        <div class="meter-value" id="meterValue">0%</div>
        <input type="range" id="cuteSlider" min="0" max="100" value="0">
      </div>
      <button class="btn-primary" id="btnMeter" disabled>确认可爱度</button>
    </div>

    <!-- 第四关 -->
    <div class="step" id="step4" data-step="4">
      <div class="progress-bar">
        <span class="progress-dot done"></span>
        <span class="progress-dot done"></span>
        <span class="progress-dot done"></span>
        <span class="progress-dot current"></span>
        <span class="progress-dot"></span>
      </div>
      <span class="step-badge">第四关</span>
      <h1>她哪里最可爱？</h1>
      <p class="subtitle">可以多选哦，选完点确认~</p>
      <div class="trait-list" id="traitList">
        <div class="trait-item" data-trait="smile">😊 笑起来眼睛会弯成月牙</div>
        <div class="trait-item" data-trait="voice">🎵 说话声音软软糯糯</div>
        <div class="trait-item" data-trait="angry">😤 生气时也超级可爱</div>
        <div class="trait-item" data-trait="all">✨ 以上全部！无可争议！</div>
      </div>
      <button class="btn-primary" id="btnTraits">我选好了</button>
    </div>

    <!-- 第五关 -->
    <div class="step" id="step5" data-step="5">
      <div class="progress-bar">
        <span class="progress-dot done"></span>
        <span class="progress-dot done"></span>
        <span class="progress-dot done"></span>
        <span class="progress-dot done"></span>
        <span class="progress-dot current"></span>
      </div>
      <span class="step-badge">最终关</span>
      <h1>最后一题</h1>
      <p class="typing-text" id="typingText"></p>
      <div class="input-wrap">
        <input type="text" class="glow-input" id="nameInput" placeholder="写下她的名字..." maxlength="20">
        <button class="btn-primary" id="btnFinal">揭晓答案 ✨</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="source-shield" id="sourceShield">
    <span class="shield-icon">🔒</span>
    <p>请关闭开发者工具<br>刷新页面后继续~</p>
  </div>

  <div id="final-scene">
    <div class="final-hearts-ring"></div>
    <div class="crown">👑</div>
    <div class="final-name" id="finalName">吕明月</div>
    <div class="final-tagline" id="finalTagline">就是这个世界上最可爱的人！</div>
  </div>

  <script>
    var CORRECT_NAME = '吕明月';
    var currentStep = 1;
    var toastTimer = null;
    var heartInterval = null;
    var particleAnimId = null;

    var toast = document.getElementById('toast');
    var cuteSlider = document.getElementById('cuteSlider');
    var meterFill = document.getElementById('meterFill');
    var meterValue = document.getElementById('meterValue');
    var btnMeter = document.getElementById('btnMeter');
    var traitList = document.getElementById('traitList');
    var btnTraits = document.getElementById('btnTraits');
    var nameInput = document.getElementById('nameInput');
    var btnFinal = document.getElementById('btnFinal');
    var typingText = document.getElementById('typingText');
    var finalScene = document.getElementById('final-scene');
    var heartsContainer = document.getElementById('hearts-container');
    var btnLoveRound = document.getElementById('btnLoveRound');
    var btnNoEscape = document.getElementById('btnNoEscape');
    var escapeHint = document.getElementById('escapeHint');
    var escapeCount = 0;
    var escapeInited = false;

    var escapeHints = [
      '嘿嘿，抓不到吧~ 😜',
      '「不可爱」？不存在的选项！',
      '再试？不可能的~',
      '放弃吧，你只能选「可爱」~',
      '「可爱」按钮越来越大了哦 💕',
      '宇宙法则：必须选可爱！'
    ];
    var wrongMessages = [
      { icon: '🙅', text: '不对不对！<br>再想想~' },
      { icon: '😏', text: '你确定吗？<br>答案就在身边哦~' },
      { icon: '🤔', text: '嗯...好像不太对<br>用心感受一下吧' },
      { icon: '💡', text: '提示：名字里有「明月」<br>再试一次！' }
    ];
    var wrongIndex = 0;

    function showToast(html) {
      toast.innerHTML = html;
      clearTimeout(toastTimer);
      toast.classList.add('show');
      toastTimer = setTimeout(function () {
        toast.classList.remove('show');
      }, 2200);
    }

    function goToStep(n) {
      document.querySelectorAll('.step').forEach(function (s) {
        s.classList.remove('active');
      });
      var target = document.getElementById('step' + n);
      if (target) {
        target.classList.remove('active');
        void target.offsetWidth;
        target.classList.add('active');
      }
      currentStep = n;
      if (n === 2) initEscapeGame();
      if (n === 5) startTyping();
    }

    function spawnBurst() {
      var burst = document.createElement('div');
      burst.className = 'burst';
      document.body.appendChild(burst);
      setTimeout(function () { burst.remove(); }, 1500);
    }

    // ===== 第二关：抓捕「不可爱」 =====
    function resetNoButton() {
      btnNoEscape.classList.remove('fleeing', 'wiggle');
      btnNoEscape.style.left = '';
      btnNoEscape.style.top = '';
      btnLoveRound.style.transform = 'scale(1)';
      escapeCount = 0;
      escapeHint.textContent = '试试能不能点到「不可爱」？';
    }

    function initEscapeGame() {
      resetNoButton();
      if (escapeInited) return;
      escapeInited = true;

      function fleeNoButton(e) {
        if (e) {
          e.preventDefault();
          e.stopPropagation();
        }
        escapeCount++;
        btnNoEscape.classList.add('fleeing');
        btnNoEscape.classList.remove('wiggle');
        void btnNoEscape.offsetWidth;
        btnNoEscape.classList.add('wiggle');

        var pad = 16;
        var bw = btnNoEscape.offsetWidth || 110;
        var bh = btnNoEscape.offsetHeight || 110;
        var maxX = window.innerWidth - bw - pad;
        var maxY = window.innerHeight - bh - pad;
        var loveRect = btnLoveRound.getBoundingClientRect();
        var newX, newY, tries = 0;

        do {
          newX = pad + Math.random() * Math.max(maxX - pad, pad);
          newY = pad + Math.random() * Math.max(maxY - pad, pad);
          tries++;
        } while (tries < 12 && (
          Math.abs(newX + bw / 2 - (loveRect.left + loveRect.width / 2)) < 140 &&
          Math.abs(newY + bh / 2 - (loveRect.top + loveRect.height / 2)) < 100
        ));

        btnNoEscape.style.left = newX + 'px';
        btnNoEscape.style.top = newY + 'px';

        var scale = Math.min(1 + escapeCount * 0.1, 2);
        btnLoveRound.style.transform = 'scale(' + scale + ')';
        btnLoveRound.style.boxShadow = '0 8px ' + (30 + escapeCount * 4) + 'px rgba(255, 65, 108, ' + Math.min(0.6 + escapeCount * 0.05, 1) + ')';

        escapeHint.textContent = escapeHints[(escapeCount - 1) % escapeHints.length];

        if (escapeCount % 3 === 0) {
          createSparkles(12);
        }
      }

      btnNoEscape.addEventListener('mouseenter', fleeNoButton);
      btnNoEscape.addEventListener('touchstart', fleeNoButton, { passive: false });
      btnNoEscape.addEventListener('click', function (e) {
        e.preventDefault();
        fleeNoButton(e);
        showToast('<span class="icon">🏃</span>跑太快啦！<br>你抓不到「不可爱」的~');
      });

      btnLoveRound.addEventListener('click', function () {
        spawnBurst();
        createSparkles(35);
        btnNoEscape.classList.remove('fleeing');
        setTimeout(function () { goToStep(3); }, 400);
      });
    }

    // ===== 第一关 =====
    document.querySelectorAll('#step1 .option-card').forEach(function (card) {
      card.addEventListener('click', function () {
        if (card.dataset.answer === 'correct') {
          spawnBurst();
          createSparkles(30);
          setTimeout(function () { goToStep(2); }, 400);
        } else {
          card.classList.remove('wrong-shake');
          void card.offsetWidth;
          card.classList.add('wrong-shake');
          var msg = wrongMessages[wrongIndex % wrongMessages.length];
          wrongIndex++;
          showToast('<span class="icon">' + msg.icon + '</span>' + msg.text);
        }
      });
    });

    // ===== 第三关 =====
    cuteSlider.addEventListener('input', function () {
      var val = parseInt(cuteSlider.value, 10);
      meterFill.style.width = val + '%';
      meterValue.textContent = val + '%';
      btnMeter.disabled = val < 100;
      if (val >= 100) {
        meterValue.textContent = '∞ 无限可爱！';
      }
    });

    btnMeter.addEventListener('click', function () {
      if (parseInt(cuteSlider.value, 10) < 100) {
        showToast('<span class="icon">📊</span>可爱度不够！<br>她明明无限可爱~');
        return;
      }
      spawnBurst();
      createSparkles(40);
      goToStep(4);
    });

    // ===== 第四关 =====
    var selectedTraits = {};
    traitList.querySelectorAll('.trait-item').forEach(function (item) {
      item.addEventListener('click', function () {
        var key = item.dataset.trait;
        if (key === 'all') {
          traitList.querySelectorAll('.trait-item').forEach(function (t) {
            t.classList.add('selected');
            selectedTraits[t.dataset.trait] = true;
          });
        } else {
          item.classList.toggle('selected');
          if (item.classList.contains('selected')) {
            selectedTraits[key] = true;
          } else {
            delete selectedTraits[key];
          }
        }
      });
    });

    btnTraits.addEventListener('click', function () {
      var count = Object.keys(selectedTraits).length;
      if (count === 0) {
        showToast('<span class="icon">🤷</span>至少选一项吧~');
        return;
      }
      if (!selectedTraits.all && count < 2) {
        showToast('<span class="icon">💭</span>她的可爱之处<br>可不止这一点哦~');
        return;
      }
      spawnBurst();
      goToStep(5);
    });

    // ===== 第五关 打字机 =====
    var typeStr = '请写下那个最可爱的人的名字...';
    function startTyping() {
      typingText.innerHTML = '';
      var i = 0;
      function type() {
        if (i <= typeStr.length) {
          typingText.innerHTML = typeStr.slice(0, i) + '<span class="typing-cursor"></span>';
          i++;
          setTimeout(type, 80);
        } else {
          nameInput.focus();
        }
      }
      type();
    }

    btnFinal.addEventListener('click', onFinalSubmit);
    nameInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') onFinalSubmit();
    });

    function onFinalSubmit() {
      var name = nameInput.value.trim();
      if (!name) {
        showToast('<span class="icon">✏️</span>请输入名字~');
        return;
      }
      if (name !== CORRECT_NAME) {
        showToast('<span class="icon">❌</span>答案错误！<br>世界上最可爱的人<br>名字里有「明月」哦~');
        nameInput.value = '';
        nameInput.focus();
        return;
      }
      triggerFinale(name);
    }

    // ===== 终极大招 =====
    function triggerFinale(name) {
      document.querySelector('.steps-wrapper').style.display = 'none';
      document.getElementById('finalName').textContent = name;
      document.getElementById('finalTagline').textContent =
        '经宇宙认证 · 全银河系 · 最可爱的人！';

      spawnBurst();
      finalScene.classList.add('active');
      startConfetti();
      createHearts(80);
      heartInterval = setInterval(function () { createHearts(20); }, 600);
      startParticles();

      document.body.style.background = '#0a0015';
    }

    function createHearts(count) {
      var hearts = ['❤', '♥', '💕', '💗', '💖', '💞', '❤️', '🌸', '✨', '💫'];
      for (var i = 0; i < count; i++) {
        var heart = document.createElement('div');
        heart.className = 'heart';
        heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        heart.style.left = Math.random() * 100 + '%';
        heart.style.bottom = '-50px';
        heart.style.color = ['#ff1744', '#ff6b9d', '#e040fb', '#ffd700'][Math.floor(Math.random() * 4)];
        heart.style.fontSize = (Math.random() * 32 + 14) + 'px';
        heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
        heart.style.animationDelay = (Math.random() * 1.5) + 's';
        heartsContainer.appendChild(heart);
        (function (el) {
          setTimeout(function () {
            if (el.parentNode) el.parentNode.removeChild(el);
          }, 6500);
        })(heart);
      }
    }

    // ===== 星星 Canvas =====
    (function initStars() {
      var canvas = document.getElementById('stars-canvas');
      var ctx = canvas.getContext('2d');
      var stars = [];

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function createStars() {
        stars = [];
        for (var i = 0; i < 120; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.8 + 0.3,
            alpha: Math.random(),
            speed: Math.random() * 0.02 + 0.005
          });
        }
      }

      function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(function (s) {
          s.alpha += s.speed;
          if (s.alpha > 1 || s.alpha < 0) s.speed = -s.speed;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255, 255, 255, ' + Math.abs(s.alpha) + ')';
          ctx.fill();
        });
        requestAnimationFrame(drawStars);
      }

      resize();
      createStars();
      drawStars();
      window.addEventListener('resize', function () { resize(); createStars(); });
    })();

    // ===== 点击火花 =====
    function createSparkles(count) {
      var canvas = document.getElementById('particles-canvas');
      var ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      var cx = canvas.width / 2;
      var cy = canvas.height / 2;
      var particles = [];
      for (var i = 0; i < count; i++) {
        var angle = (Math.PI * 2 / count) * i;
        var speed = Math.random() * 6 + 3;
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          color: ['#ff6b9d', '#e040fb', '#ffd700', '#fff', '#7c4dff'][Math.floor(Math.random() * 5)],
          size: Math.random() * 4 + 2
        });
      }
      function anim() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        var alive = false;
        particles.forEach(function (p) {
          if (p.life <= 0) return;
          alive = true;
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.1;
          p.life -= 0.025;
          ctx.globalAlpha = p.life;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
        });
        if (alive) requestAnimationFrame(anim);
        else ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
      anim();
    }

    // ===== 持续粒子 =====
    function startParticles() {
      var canvas = document.getElementById('particles-canvas');
      var ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      var particles = [];

      function spawn() {
        particles.push({
          x: Math.random() * canvas.width,
          y: canvas.height + 10,
          vx: (Math.random() - 0.5) * 2,
          vy: -(Math.random() * 3 + 1),
          life: 1,
          color: ['#ff6b9d', '#e040fb', '#ffd700', '#7c4dff'][Math.floor(Math.random() * 4)],
          size: Math.random() * 3 + 1
        });
      }

      function anim() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (particles.length < 60) spawn();
        particles = particles.filter(function (p) {
          p.x += p.vx;
          p.y += p.vy;
          p.life -= 0.008;
          if (p.life <= 0) return false;
          ctx.globalAlpha = p.life;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
          return true;
        });
        particleAnimId = requestAnimationFrame(anim);
      }
      anim();
    }

    // ===== 彩纸 =====
    function startConfetti() {
      var canvas = document.getElementById('confetti-canvas');
      var ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      var confetti = [];
      var colors = ['#ff6b9d', '#e040fb', '#ffd700', '#7c4dff', '#00e5ff', '#ff4081', '#fff'];

      for (var i = 0; i < 150; i++) {
        confetti.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          w: Math.random() * 10 + 5,
          h: Math.random() * 6 + 3,
          color: colors[Math.floor(Math.random() * colors.length)],
          vx: (Math.random() - 0.5) * 4,
          vy: Math.random() * 4 + 2,
          rot: Math.random() * 360,
          rotSpeed: (Math.random() - 0.5) * 10
        });
      }

      function anim() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        confetti.forEach(function (c) {
          c.x += c.vx;
          c.y += c.vy;
          c.vy += 0.05;
          c.rot += c.rotSpeed;
          if (c.y > canvas.height + 20) {
            c.y = -20;
            c.x = Math.random() * canvas.width;
          }
          ctx.save();
          ctx.translate(c.x, c.y);
          ctx.rotate(c.rot * Math.PI / 180);
          ctx.fillStyle = c.color;
          ctx.globalAlpha = 0.85;
          ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
          ctx.restore();
        });
        requestAnimationFrame(anim);
      }
      anim();
    }

    window.addEventListener('resize', function () {
      ['particles-canvas', 'confetti-canvas'].forEach(function (id) {
        var c = document.getElementById(id);
        c.width = window.innerWidth;
        c.height = window.innerHeight;
      });
    });

    (function initSourceProtect() {
      var shield = document.getElementById('sourceShield');
      var devtoolsFlag = false;
      var noop = function () {};

      ['log', 'debug', 'info', 'warn', 'error', 'table', 'trace', 'dir'].forEach(function (m) {
        try { console[m] = noop; } catch (err) {}
      });

      document.addEventListener('selectstart', function (e) {
        var tag = e.target && e.target.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA') return;
        e.preventDefault();
      });

      document.addEventListener('copy', function (e) {
        var tag = e.target && e.target.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA') return;
        e.preventDefault();
      });

      document.addEventListener('cut', function (e) {
        var tag = e.target && e.target.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA') return;
        e.preventDefault();
      });

      document.addEventListener('dragstart', function (e) {
        e.preventDefault();
      });

      function showShield(show) {
        shield.classList.toggle('show', show);
        document.documentElement.classList.toggle('devtools-blocked', show);
      }

      function markDevToolsOpen() {
        if (!devtoolsFlag) {
          devtoolsFlag = true;
          showShield(true);
        }
      }

      function isMobileDevice() {
        return 'ontouchstart' in window ||
          navigator.maxTouchPoints > 0 ||
          /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
      }

      function isInputFocused() {
        var el = document.activeElement;
        return el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA');
      }

      function detectDevTools() {
        // 移动端弹出软键盘会改变视口尺寸，不能靠宽高差检测
        if (isMobileDevice() || isInputFocused()) {
          if (devtoolsFlag) {
            devtoolsFlag = false;
            showShield(false);
          }
          return;
        }
        var threshold = 160;
        var gapW = window.outerWidth - window.innerWidth > threshold;
        var gapH = window.outerHeight - window.innerHeight > threshold;
        if (gapW || gapH) {
          markDevToolsOpen();
        } else if (devtoolsFlag) {
          devtoolsFlag = false;
          showShield(false);
        }
      }

      document.addEventListener('focusin', function () {
        if (isInputFocused() && devtoolsFlag) {
          devtoolsFlag = false;
          showShield(false);
        }
      });

      setInterval(detectDevTools, 500);
      window.addEventListener('resize', detectDevTools);

      var trap = new Image();
      Object.defineProperty(trap, 'id', {
        get: function () {
          markDevToolsOpen();
        }
      });

      setInterval(function () {
        detectDevTools();
      }, 800);
    })();
  </script>
</body>
</html>
